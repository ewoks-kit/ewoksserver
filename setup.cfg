[metadata]
name = ewoksweback
version = attr: ewoksweback.__version__
author = ESRF
description = Backend for ewoksweb
long_description = file: README.md
long_description_content_type = text/markdown
license = MIT
url = https://gitlab.esrf.fr/workflow/ewoks/ewoksweback
project_urls = 
    Source = https://gitlab.esrf.fr/workflow/ewoks/ewoksweback
    Documentation = https://workflow.gitlab-pages.esrf.fr/ewoks/ewoksweback
    Tracker = https://gitlab.esrf.fr/workflow/ewoks/ewoksweback/issues
classifiers = 
    Intended Audience :: Science/Research
    License :: OSI Approved :: MIT License
    Programming Language :: Python :: 3

[options]
packages = find:
python_requires = >=3.6
install_requires = 
    flask
    flask-restful
    flask-cors

[options.extras_require]
test = 
    pytest

[options.entry_points]
console_scripts =
    ewoks-server=ewoksweback.app.server:main
